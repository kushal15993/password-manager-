{% extends "base.html" %}

{% block title %}View Password - Password Manager{% endblock %}

{% block content %}
<div class="card">
    <h2>Password Details</h2>
    
    <div style="margin-top: 20px;">
        <div class="form-group">
            <label>Website/Service:</label>
            <input type="text" value="{{ password.website }}" readonly style="background-color: #f8f9fa;">
        </div>

        <div class="form-group">
            <label>Username/Email:</label>
            <input type="text" value="{{ password.username }}" readonly style="background-color: #f8f9fa;">
        </div>

        <div class="form-group">
            <label>Password:</label>
            <div style="display: flex; gap: 10px;">
                <input type="password" id="passwordField" value="{{ decrypted_pwd }}" readonly style="background-color: #f8f9fa; flex: 1;">
                <button type="button" class="btn" id="toggleBtn" onclick="togglePassword()">Show</button>
                <button type="button" class="btn" onclick="copyToClipboard()">Copy</button>
            </div>
        </div>

        <div class="form-group">
            <label>Date Added:</label>
            <input type="text" value="{{ password.date_created.strftime('%Y-%m-%d %H:%M:%S') }}" readonly style="background-color: #f8f9fa;">
        </div>

        <div style="display: flex; gap: 10px; margin-top: 30px;">
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Back</a>
            <a href="{{ url_for('delete_password', id=password.id) }}" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this password?')">Delete</a>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordField = document.getElementById('passwordField');
        const toggleBtn = document.getElementById('toggleBtn');
        
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            toggleBtn.textContent = 'Hide';
        } else {
            passwordField.type = 'password';
            toggleBtn.textContent = 'Show';
        }
    }

    function copyToClipboard() {
        const passwordField = document.getElementById('passwordField');
        passwordField.select();
        document.execCommand('copy');
        alert('Password copied to clipboard!');
    }
</script>
{% endblock %}
